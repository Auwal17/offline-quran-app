name: offline_quran
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Audio Playback & Background Service
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & UI Utilities
  google_fonts: ^6.1.0 # Optional: For clean English typography
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Add this line!
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/surah_data.json

  fonts:
    - family: Uthmani
      fonts:
        - asset: assets/fonts/Uthmani.ttf